<!doctype html>
<html>
  <style>
    openapi-explorer {
	--nav-path-padding: 0px 0px 0.2em 1.5em;
	--font-regular: 'Inter', sans-serif;
	--font-mono: 'JetBrains Mono', monospace;
	--font-size-regular: 15px;
	--font-size-small: 14px;
    }
    openapi-explorer::part(label-tag-title) {
	padding-bottom: 0.5em;
    }
  </style>
  <head>
    <title>Command Centre API - OpenAPI Explorer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="module" src="https://unpkg.com/openapi-explorer/dist/browser/openapi-explorer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter&family=JetBrains+Mono" rel="stylesheet" />
    <body>
    <openapi-explorer
      spec-url="out_oae.yaml"
      enable-console="true_no"
      hide-server-selection
      hide-authentication
      hide-components="false"
      default-schema-tab="body"
      display-nulls="true"
      nav-bg-color="#303030"
      primary-color="#ff6000"
      secondary-color="#ff9000"
      text-color="#000000"
      use-path-in-nav-bar="false" <!-- true turns on tags for HTTP verb -->
      >
    </openapi-explorer>
  </body>
</html>
