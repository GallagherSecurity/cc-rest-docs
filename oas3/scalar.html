<!doctype html>
<html>
  <head>
    <title>Command Centre API - Scalar</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <div id="app"></div>
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
    <script>
      Scalar.createApiReference('#app', {
	  url: 'out_scalar.yaml',
	  documentDownloadType: 'direct',
	  agent: { disabled: true, },
	  hideClientButton: true,
	  zzzwithDefaultfonts: false,
	  zzzexpandAllResponses: "true saves some clicks opening the 200 response but makes for an extremely long document",
	  expandAllResponses: false,
	  orderRequiredPropertiesFirst: true,
	  tagsSorter: 'alpha',
	  operationsSorter: (a, b) => {
	      const verbOrder = ['delete', 'put', 'post', 'patch', 'get']
	      return (a.method != b.method) ? verbOrder.indexOf(b.method) - verbOrder.indexOf(a.method) : a.path.localeCompare(b.path)
	  },
	  zzzshowOperationId: true,
      })
    </script>
  </body>
</html>
